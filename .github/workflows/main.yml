name: Tự động đồng bộ Podcast

on:
  workflow_dispatch: # Chỉ cho phép chạy thủ công hoặc được kích hoạt qua API (từ Bot Telegram)

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Cấp quyền ghi để có thể push file playlist.json lên lại GitHub
    permissions:
      contents: write
    
    steps:
      # Bước 1: Lấy mã nguồn từ GitHub (Dùng bản v4 mới nhất)
      - uses: actions/checkout@v4
      
      # Bước 2: Cài đặt môi trường Python (Dùng bản v5 mới nhất)
      - name: Cài đặt Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      # Bước 3: Cài đặt các thư viện cần thiết
      - name: Cài đặt thư viện
        run: pip install feedparser requests huggingface_hub
        
      # Bước 4: Chạy script để tải nhạc từ Spreaker và đẩy sang Hugging Face
      - name: Chạy script đồng bộ
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python sync_podcast.py
        
      # Bước 5: Lưu file playlist.json mới về lại GitHub và kích hoạt Netlify Deploy
      - name: Lưu thay đổi vào GitHub
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add playlist.json
          git commit -m "Cập nhật bài mới tự động" || exit 0
          git push
